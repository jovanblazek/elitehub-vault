name: Deploy Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    env:
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      COOLIFY_API_UUID: ${{ secrets.COOLIFY_API_UUID }}
      COOLIFY_EDDN_LISTENER_UUID: ${{ secrets.COOLIFY_EDDN_LISTENER_UUID }}
      COOLIFY_EDDN_WORKER_UUID: ${{ secrets.COOLIFY_EDDN_WORKER_UUID }}
      COOLIFY_DB_MIGRATOR_UUID: ${{ secrets.COOLIFY_DB_MIGRATOR_UUID }}
      WORKER_DRAIN_SECONDS: ${{ vars.WORKER_DRAIN_SECONDS || '20' }}
      SENTRY_RELEASE: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        shell: bash
        run: |
          source .github/scripts/coolify.sh
          validate_deploy_config

      - name: Pin migrator helper to this commit
        shell: bash
        run: |
          source .github/scripts/coolify.sh
          pin_app_to_commit "${COOLIFY_DB_MIGRATOR_UUID}" "${GITHUB_SHA}"

      - name: Stop eddn-worker and allow it to drain
        shell: bash
        run: |
          source .github/scripts/coolify.sh
          stop_app "${COOLIFY_EDDN_WORKER_UUID}"

          sleep "${WORKER_DRAIN_SECONDS}"

      - name: Run database migrations
        id: migrate
        shell: bash
        run: |
          source .github/scripts/coolify.sh
          migration_deployment_uuid="$(start_app "${COOLIFY_DB_MIGRATOR_UUID}")"
          wait_for_deployment "${migration_deployment_uuid}" "Migration"

      - name: Stop migrator helper container after migration failure
        if: ${{ always() && steps.migrate.outcome == 'failure' }}
        shell: bash
        run: |
          source .github/scripts/coolify.sh
          stop_app "${COOLIFY_DB_MIGRATOR_UUID}"

      - name: Restart eddn-worker if migrations fail
        if: ${{ always() && steps.migrate.outcome == 'failure' }}
        shell: bash
        run: |
          source .github/scripts/coolify.sh
          worker_deployment_uuid="$(start_app "${COOLIFY_EDDN_WORKER_UUID}")"
          wait_for_deployment "${worker_deployment_uuid}" "eddn-worker recovery"

      - name: Stop migrator helper container
        if: ${{ steps.migrate.outcome == 'success' }}
        shell: bash
        run: |
          source .github/scripts/coolify.sh
          stop_app "${COOLIFY_DB_MIGRATOR_UUID}"

      - name: Prepare runtime apps for this release
        shell: bash
        run: |
          source .github/scripts/coolify.sh

          pin_app_to_commit "${COOLIFY_API_UUID}" "${GITHUB_SHA}"
          pin_app_to_commit "${COOLIFY_EDDN_LISTENER_UUID}" "${GITHUB_SHA}"
          pin_app_to_commit "${COOLIFY_EDDN_WORKER_UUID}" "${GITHUB_SHA}"

          set_app_env "${COOLIFY_API_UUID}" "SENTRY_RELEASE" "${SENTRY_RELEASE}"
          set_app_env "${COOLIFY_EDDN_LISTENER_UUID}" "SENTRY_RELEASE" "${SENTRY_RELEASE}"
          set_app_env "${COOLIFY_EDDN_WORKER_UUID}" "SENTRY_RELEASE" "${SENTRY_RELEASE}"

      - name: Deploy api, eddn-listener, and eddn-worker concurrently
        shell: bash
        run: |
          source .github/scripts/coolify.sh

          api_deployment_uuid="$(restart_app "${COOLIFY_API_UUID}")"
          listener_deployment_uuid="$(restart_app "${COOLIFY_EDDN_LISTENER_UUID}")"
          worker_deployment_uuid="$(start_app "${COOLIFY_EDDN_WORKER_UUID}")"

          # Wait for all deployments after they have been queued.
          wait_for_deployment "${api_deployment_uuid}" "api"
          wait_for_deployment "${listener_deployment_uuid}" "eddn-listener"
          wait_for_deployment "${worker_deployment_uuid}" "eddn-worker"
